<svg width="460" height="130" viewBox="0 0 460 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bar1 { animation: bounce1 0.8s ease infinite alternate; }
      .bar2 { animation: bounce2 0.6s ease infinite alternate; }
      .bar3 { animation: bounce3 0.9s ease infinite alternate; }
      .bar4 { animation: bounce4 0.7s ease infinite alternate; }
      .bar5 { animation: bounce5 0.5s ease infinite alternate; }
      .bar6 { animation: bounce6 1.0s ease infinite alternate; }
      .bar7 { animation: bounce7 0.65s ease infinite alternate; }
      .bar8 { animation: bounce8 0.75s ease infinite alternate; }
      @keyframes bounce1 { from { height: 4px; y: 96px; } to { height: 20px; y: 80px; } }
      @keyframes bounce2 { from { height: 8px; y: 92px; } to { height: 28px; y: 72px; } }
      @keyframes bounce3 { from { height: 6px; y: 94px; } to { height: 18px; y: 82px; } }
      @keyframes bounce4 { from { height: 10px; y: 90px; } to { height: 30px; y: 70px; } }
      @keyframes bounce5 { from { height: 5px; y: 95px; } to { height: 22px; y: 78px; } }
      @keyframes bounce6 { from { height: 8px; y: 92px; } to { height: 16px; y: 84px; } }
      @keyframes bounce7 { from { height: 12px; y: 88px; } to { height: 26px; y: 74px; } }
      @keyframes bounce8 { from { height: 6px; y: 94px; } to { height: 20px; y: 80px; } }
    </style>
    <clipPath id="roundCard">
      <rect width="460" height="130" rx="12"/>
    </clipPath>
    <clipPath id="roundCover">
      <rect x="16" y="16" width="98" height="98" rx="6"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="460" height="130" rx="12" fill="#121212"/>

  <!-- Album cover with real image -->
  <image x="16" y="16" width="98" height="98" clip-path="url(#roundCover)"
    href="data:image/png;base64,"/>

  <!-- Spotify icon -->
  <circle cx="432" cy="22" r="14" fill="#1DB954"/>
  <text x="432" y="27" font-size="14" text-anchor="middle" fill="white" font-family="Arial">♫</text>

  <!-- Song title -->
  <text x="130" y="52" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">Bad Influence</text>

  <!-- Artist -->
  <text x="130" y="74" font-family="Arial, sans-serif" font-size="13" fill="#b3b3b3">Vlad Holiday</text>

  <!-- Animated bars -->
  <rect class="bar1" x="130" y="96" width="5" height="4" rx="2" fill="#1DB954"/>
  <rect class="bar2" x="139" y="92" width="5" height="8" rx="2" fill="#1DB954"/>
  <rect class="bar3" x="148" y="94" width="5" height="6" rx="2" fill="#1DB954"/>
  <rect class="bar4" x="157" y="90" width="5" height="10" rx="2" fill="#1DB954"/>
  <rect class="bar5" x="166" y="95" width="5" height="5" rx="2" fill="#1DB954"/>
  <rect class="bar6" x="175" y="92" width="5" height="8" rx="2" fill="#1DB954"/>
  <rect class="bar7" x="184" y="88" width="5" height="12" rx="2" fill="#1DB954"/>
  <rect class="bar8" x="193" y="94" width="5" height="6" rx="2" fill="#1DB954"/>
</svg>
